<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soundbox Comparison</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 0;
    padding-bottom: 70px;
  }

  header {
    background: #d91e18;
    color: white;
    padding: 15px 20px;
  }

  .header-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title h1 {
    margin: 0;
    font-size: 22px;
  }

  .title p {
    margin: 0;
    font-size: 13px;
    opacity: 0.9;
  }

  .datetime {
    font-size: 14px;
    font-weight: bold;
    text-align: right;
  }

  .back {
    text-align: center;
    margin: 15px;
  }

  .btn {
    display: inline-block;
    padding: 8px 12px;
    background: #0b5ed7;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    border: none;
    cursor: pointer;
  }

  .company {
    margin: 20px auto;
    max-width: 900px;
  }

  .company h2 {
    background: #e9ecef;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
  }

  .plan {
    background: white;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    display: flex;
    gap: 15px;
    align-items: center;
  }

  .plan img {
    width: 120px;
    height: 90px;
    object-fit: contain;
  }

  .info {
    flex: 1;
  }

  .price {
    color: #d91e18;
    font-weight: bold;
  }

  /* FOOTER */
  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #d91e18;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
  }

  .footer-bar button {
    background: white;
    color: #d91e18;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }

  .popup-box {
    background: white;
    width: 320px;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
  }

  .close-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #d91e18;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
.footer-bar button:nth-child(2){
  background:#28a745;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-box">
    <div class="title">
      <h1>Airtel Payment Merchant</h1>
      <p>Make your payment easy secure with Airtel</p>
    </div>

    <div class="datetime" id="clock"></div>
  </div>
</header>


<!-- FOOTER -->
<footer class="footer-bar">
  <button onclick="openLoan()">Loan</button>

  <!-- HOME BUTTON -->
  <button onclick="window.location.href='index.html'">Home</button>

  <button onclick="openHelp()">Help</button>

</footer>

<!-- LOAN POPUP -->
<div id="loanPopup" class="modal">
  <div class="popup-box">
    <h2>Loan Details</h2>
    <p><b>Interest Rate:</b> Starting from 9.9% per annum</p>
    <p>✔ Easy EMI Options<br>✔ Quick Approval<br>✔ Merchant Support</p>
    <button class="close-btn" onclick="closeLoan()">Close</button>
  </div>
</div>

<!-- HELP POPUP -->
<div id="helpModal" class="modal">
  <div class="popup-box">
    <h2>Customer Care</h2>
    <p>📞 1800-103-6065</p>
    <p>📞 12150 (Airtel Users)</p>
 <p>
      🌐 <a href="https://www.airtel.in/digital-tv/dth-contact-us/customer-care" target="_blank">
        Regional Support Link
      </a>
    </p>

    <button onclick="closeHelp()">Close</button>
  </div>
</div>

<!-- SCRIPT -->
<script>
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);

// LOAN
function openLoan() {
  document.getElementById("loanPopup").style.display = "flex";
}
function closeLoan() {
  document.getElementById("loanPopup").style.display = "none";
}

// HELP
function openHelp() {
  document.getElementById("helpModal").style.display = "flex";
}
function closeHelp() {
  document.getElementById("helpModal").style.display = "none";
}
</script>

</body>
</html>
